name: Snyk Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # Setup Java (Required)
      # -------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # -------------------------
      # Install Snyk CLI
      # -------------------------
      - name: Install Snyk
        run: npm install -g snyk

      # -------------------------
      # Authenticate Snyk
      # -------------------------
      - name: Snyk Authentication
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # -------------------------
      # Run Snyk Scan (IMPORTANT PART)
      # -------------------------
      - name: Run Snyk Maven Scan
        run: |
          cd HospitalManagementSystem
          snyk test --severity-threshold=high

      # -------------------------
      # Email on SUCCESS
      # -------------------------
      - name: Send success mail
        if: ${{ success() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ✅ Snyk Security Scan Passed
          body: |
            Hi,

            ✅ Snyk security scan completed successfully.
            No HIGH or CRITICAL vulnerabilities were found.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
          to: ${{ secrets.SECURITY_MAIL_TO }}
          from: CI Pipeline <${{ secrets.SMTP_USERNAME }}>

      # -------------------------
      # Email on FAILURE
      # -------------------------
      - name: Send failure mail
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ❌ Snyk Security Scan Failed
          body: |
            Hi,

            ❌ Snyk security scan FAILED.
            HIGH or CRITICAL vulnerabilities were detected.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}

            Please check the Snyk dashboard for details.
          to: ${{ secrets.SECURITY_MAIL_TO }}
          from: CI Pipeline <${{ secrets.SMTP_USERNAME }}>
